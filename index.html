<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Running Teks</title>

<style>

html,
body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:transparent;
}

.running-text{
    position:absolute;
    white-space:nowrap;

    font-family:Corbel, Arial, sans-serif;
    font-size:48px;
    font-weight:bold;
    color:red;

    animation:jalan 15s linear infinite;
}

@keyframes jalan{

    from{
        transform:translateX(100vw);
    }

    to{
        transform:translateX(-100%);
    }

}

</style>

</head>

<body>

<div class="running-text">

    Turut Berduka Cita Atas Berpulangnya Almarhum / Almarhumah

</div>

</body>

</html>
