<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Running Teks</title>

<style>

html,
body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:transparent;
}

.running-text{

    position:fixed;

    left:0;
    top:100%;

    transform:translateY(-50%);

    white-space:nowrap;

    font-family:"Comic Sans MS";
    font-size:72px;
    font-weight:bold;
    color:white;

    opacity:0.8;

    animation:jalan 40s linear infinite;
}

@keyframes jalan{

    0%{
        transform:translate(100vw,-50%);
    }

    100%{
        transform:translate(-100%,-50%);
    }

}

</style>

</head>

<body>

<div class="running-text">

Selamat Beribadah Kiranya Kita Mendapat RahmatNya

</div>

</body>

</html>
